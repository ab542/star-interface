# ==================== 正常场景 ====================
- name: "正常查询"
  method: POST
  url: /api/post/monitor/statistic
  headers:
    Content-Type: application/json
    e-project-id: "${projectId}"
  json:
    publishBegDate: "2025-11-08"
    publishEndDate: "2025-11-15"
    platform: "Tiktok"
    isPublic: 1
    hierarchyItemIds: [307, 305, 303, 301, 299, 297, 295, 293, 291, 289, 287, 285, 283, 281, 279, 277, 240, 482, 484, 242, 252, 256, 262, 551, 633, 634, 635, 636, 309, 311, 526, 313, 315, 317, 553, 319, 321, 491, 493, 495, 497, 499, 501, 503, 505, 507, 509, 511, 513, 515, 517, 521, 523]
    mediaType: "Video"
    title: "je"
    projectId: "${projectId}"
    mediaTagIds: [2905, 2907, 2925, 3050, 3122, 3123, 3125, 3126, 3127, 3139, 3140, 3141, 3142, 3143, 3144, 3420, 3438, 3439, 3440, 3441, 3442, 3443, 3444, 3445, 3446, 3447, 3448, 3449]
    page: 1
    size: 15
    competitorType: 0
    videoStatus: 1
    hashTagName: "jetour"
  expected_status: 200
  expected_response:
    code: 0
    msg: "success"
    data: {}

