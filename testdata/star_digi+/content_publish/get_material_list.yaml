# 内容发布 - 获取素材列表接口测试用例
# 自动生成自 OpenAPI: api/content_publish/获取素材列表_OpenAPI.json
# 每个筛选参数单独测试一个用例，确保每个筛选条件独立工作
#
# ====================================================================
# 分类                数量  参数/说明
# ====================================================================
# 基础场景              2个  只传分页参数（含必填projectId）、全参数组合筛选
# 单个参数独立测试
# - 文件夹筛选          1个  folderId（按文件夹Id筛选）
# - 素材类型筛选        2个  sourceType（图片0/视频1）
# - 发布状态筛选（各平台） 8个  facebookStatus(0/1)、insStatus(0/1)、
#                         tiktokStatus(0/1)、youtubeStatus(0/1)
# - 数组类型筛选        3个  designerIdList（设计师Ids）、
#                         publishStatusList（发布状态列表）、
#                         sourceIdList（素材Ids）
# - 关键词筛选          1个  name（素材标题关键词）
# - 时间范围筛选        1个  begDate + endDate
# 边界测试              3个  页码为0、页大小为0、页大小极大(10000)
# 特殊值测试            5个  所有数组为空、空关键词字符串、
#                         缺失projectId、空日期范围、单个素材Id
# ====================================================================
# 总计                26个 测试用例
# ====================================================================

# 基础场景
- name: "内容发布 - 获取素材列表-只传分页参数"
  method: POST
  url: /star-api/publish/source/list
  headers:
    Content-Type: application/json
  json:
    page: 1
    size: 10
    projectId: $projectId
  expected_status: 200
  expected_response:
    code: 0
  max_retries: 3

- name: "内容发布 - 获取素材列表-全参数组合筛选"
  method: POST
  url: /star-api/publish/source/list
  headers:
    Content-Type: application/json
  json:
    page: 1
    size: 10
    projectId: $projectId
    folderId: 1
    sourceType: 0
    facebookStatus: 0
    insStatus: 0
    tiktokStatus: 0
    youtubeStatus: 0
    designerIdList: [1, 2]
    name: "test"
    begDate: "2024-01-01"
    endDate: "2024-12-31"
  expected_status: 200
  expected_response:
    code: 0
  max_retries: 3

