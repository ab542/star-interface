# 内容发布 - 获取发布列表接口测试用例
# 自动生成自 OpenAPI: api/content_publish/获取发布列表_OpenAPI.json
# 每个筛选参数单独测试一个用例，确保每个筛选条件独立工作
#
# ====================================================================
# 分类                数量  参数/说明
# ====================================================================
# 基础场景              2个  只传分页参数（含必填projectId）、全参数组合筛选
# 单个参数独立测试
# - 组织架构筛选        1个  hierarchyItemIds（组织架构子项Ids）
# - 社媒账号筛选        1个  mediaIdList（社媒账号Ids）
# - 发布状态筛选        6个  0草稿/1待发布/2发布/3发布失败/4取消/5删除
# - 用户Id筛选          1个  userId（用户Id）
# - 时间范围筛选        1个  begDate + endDate（起始/结束时间）
# 边界测试              3个  页码为0、页大小为0、页大小极大(10000)
# 特殊值测试            6个  空组织架构数组、空社媒账号数组、
#                         空起始结束时间、缺失projectId、
#                         单个组织架构Id、单个社媒账号Id
# ====================================================================
# 总计                20个 测试用例
# ====================================================================

# 基础场景
- name: "内容发布 - 获取发布列表-只传分页参数"
  method: POST
  url: /api/publish/article/list
  headers:
    Content-Type: application/json
    e-project-id: "${projectId}"
  json:
    page: 1
    size: 10
    projectId: $projectId
  expected_status: 200
  expected_response:
    code: 0
  max_retries: 3

- name: "内容发布 - 获取发布列表-全参数组合筛选"
  method: POST
  url: /api/publish/article/list
  headers:
    Content-Type: application/json
    e-project-id: "${projectId}"
  json:
    page: 1
    size: 10
    projectId: $projectId
    hierarchyItemIds: [1, 2]
    mediaIdList: [1001, 1002]
    status: "2"
    userId: 123
    begDate: "2024-01-01"
    endDate: "2024-12-31"
  expected_status: 200
  expected_response:
    code: 0
  max_retries: 3

