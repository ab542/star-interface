# 内容发布 - 问我上传素材接口测试用例
# 自动生成自 OpenAPI: api/content_publish/问我上传素材_OpenAPI.json
#
# ====================================================================
# 分类                数量  参数/说明
# ====================================================================
# 基础场景              2个  必填参数完整组合、单素材上传
# 嵌套对象参数测试     2个  图片类型素材、视频类型素材
# 边界测试              3个  projectId=0、folderId=0、空媒体列表
# 特殊值测试           4个  缺失folderId(可选参数)、缺失description、
#                         空标题字符串、缺失封面地址
# ====================================================================
# 总计                11个 测试用例
# ====================================================================

# 基础场景
- name: "内容发布 - 上传素材-多素材完整参数"
  method: POST
  url: /api/publish/source/upload
  headers:
    Content-Type: application/json
    e-project-id: "${projectId}"
  json:
    projectId: $projectId
    folderId: 1
    mediaList:
      - title: "测试图片素材"
        description: "这是一张测试图片"
        fileUrl: "https://example.com/test.jpg"
        fileCover: "https://example.com/test_cover.jpg"
        sourceType: 0
        width: 1080
        height: 1920
      - title: "测试视频素材"
        description: "这是一个测试视频"
        fileUrl: "https://example.com/test.mp4"
        fileCover: "https://example.com/test_cover.jpg"
        sourceType: 1
        duration: 30
        width: 1080
        height: 1920
  expected_status: 200
  expected_response:
    code: 0
  max_retries: 3

