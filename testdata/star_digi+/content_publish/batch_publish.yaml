# 内容发布 - 批量发布接口测试用例
# 自动生成自 OpenAPI: api/content_publish/批量发布_OpenAPI.json
# 每个参数场景单独测试一个用例，确保每个参数独立工作
#
# ====================================================================
# 分类                数量  参数/说明
# ====================================================================
# 基础场景              1个  正常批量发布（单个素材发布到单个账户）
# 批量组合场景          1个  多个素材发布到多个账户
# 单个参数独立测试
# - 不同发布状态         5个  草稿0/待发布1/发布2/发布失败3/取消4
# - 不同平台参数         4个  Facebook/Ins/TikTok/YouTube 平台参数
# - 定时发布时间         1个  带发布时间与时区
# - 首次评论内容        1个  带首次评论
# - 重新发布场景         1个  重新发布带againStatus
# 边界测试              2个  空发布列表、空素材列表、空账户列表
# 特殊值测试            5个  缺少必填pubishDTOList、缺少projectId、
#                         缺少accountIds、缺少source、单个素材单个账户
# ====================================================================
# 总计                16个 测试用例
# ====================================================================

# 基础场景 - 正常批量发布
- name: "内容发布 - 批量发布-单个素材发布到单个账户"
  method: POST
  url: /api/publish/article/batch
  headers:
    Content-Type: application/json
    e-project-id: "${projectId}"
  json:
    pubishDTOList:
      - projectId: $projectId
        accountIds: [1]
        source:
          - sourceId: 1
            sourceTitle: "test image"
            sourceType: 0
            mediaUrl: "https://example.com/image.jpg"
            coverUrl: "https://example.com/cover.jpg"
            width: 1080
            height: 1080
            duration: 0
        status: 1
        description: "test batch publish"
  expected_status: 200
  expected_response:
    code: 0
  max_retries: 3

# 批量组合场景 - 多个素材发布到多个账户
- name: "内容发布 - 批量发布-多个素材发布到多个账户"
  method: POST
  url: /api/publish/article/batch
  headers:
    Content-Type: application/json
    e-project-id: "${projectId}"
  json:
    pubishDTOList:
      - projectId: $projectId
        accountIds: [1, 2]
        source:
          - sourceId: 1
            sourceTitle: "test image 1"
            sourceType: 0
            mediaUrl: "https://example.com/image1.jpg"
            coverUrl: "https://example.com/cover1.jpg"
            width: 1080
            height: 1080
          - sourceId: 2
            sourceTitle: "test video 1"
            sourceType: 1
            mediaUrl: "https://example.com/video1.mp4"
            coverUrl: "https://example.com/cover1.jpg"
            width: 1920
            height: 1080
            duration: 30
        status: 1
        description: "batch publish multiple items"
      - projectId: $projectId
        accountIds: [3]
        source:
          - sourceId: 3
            sourceTitle: "test image 2"
            sourceType: 0
            mediaUrl: "https://example.com/image2.jpg"
            coverUrl: "https://example.com/cover2.jpg"
            width: 1080
            height: 1080
        status: 1
        description: "second batch item"
  expected_status: 200
  expected_response:
    code: 0
  max_retries: 3

