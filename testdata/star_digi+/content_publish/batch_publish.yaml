# TikTok平台参数测试
- name: "内容发布 - 批量发布-TikTok平台发布参数"
  method: POST
  url: /api/publish/article/batch
  headers:
    Content-Type: application/json
    e-project-id: "${projectId}"
  json:
    pubishDTOList:
      - projectId: $projectId
        accountIds: [1]
        source:
          - sourceId: 1
            sourceTitle: "tiktok test"
            sourceType: 0
            mediaUrl: "https://example.com/image.jpg"
            coverUrl: "https://example.com/cover.jpg"
        status: 1
        description: "tiktok platform test"
        platformReq:
          tiktok:
            post_mode: "DIRECT POST"
            media_type: "Photo"
            post_info:
              description: "test tiktok post"
              disable_comment: false
              disable_duet: false
              disable_stitch: false
              privacy_level: "PUBLIC_TO_EVERYONE"
            source_info:
              source: "PULL_FROM_URL"
              photo_images: ["https://example.com/image.jpg"]
  expected_status: 200
  expected_response:
    code: 0
  max_retries: 3

