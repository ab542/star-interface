# ==================== 异常场景 ====================

- name: "日期区间超过 31 天"
  method: POST
  url: /api/dashboard/project/rank/detail
  headers:
    Content-Type: application/json
    e-project-id: "${projectId}"   # ← 占位
  json:
    beginDate: "2025-10-01"
    endDate: "2025-11-13"        # 43 天
    hierarchyId: 77
    hierarchyItemIds: [307,305,303,301,299,297,295,293,291,289,287,285,283,281,279,277,240,482,484,242,252,256,262,551,633,634,635,636,309,311,526,313,315,317,553,319,321,491,493,495,497,499,501,503,505,507,509,511,513,515,517,521,523]
    page: 1
    platform: "facebook"
    principalIds: [25]
    projectId: "${projectId}"   # ← 占位
    rankType: 1
    size: 10
    sortType: "fansAdd"
    tagIds: []
  expected_status: 400
  expected_response:
    code: 400
    msg: "查询区间不能超过 31 天"

